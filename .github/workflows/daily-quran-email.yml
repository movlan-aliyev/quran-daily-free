# Daily Quran email — runs on GitHub’s servers (no PC required).
# Schedule is UTC; adjust cron to match your local morning.

name: Daily Quran email

on:
  schedule:
    # 15:30 UTC ≈ 10:30 US Eastern Standard Time (winter). For summer (EDT), try 14:30 UTC.
    - cron: "30 15 * * *"
  workflow_dispatch:

concurrency:
  group: quran-daily-email
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from secrets
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_GUIDANCE: ${{ secrets.OPENAI_GUIDANCE }}
          CHUNK_SIZE: ${{ secrets.CHUNK_SIZE }}
        run: |
          python3 << 'PY'
          import os
          from pathlib import Path

          required = [
              "SMTP_HOST",
              "SMTP_PORT",
              "SMTP_USER",
              "SMTP_PASSWORD",
              "MAIL_FROM",
              "MAIL_TO",
          ]
          optional = [
              "OPENAI_API_KEY",
              "OPENAI_MODEL",
              "OPENAI_GUIDANCE",
              "CHUNK_SIZE",
          ]
          lines: list[str] = []
          for k in required:
              v = (os.environ.get(k) or "").strip()
              if not v:
                  raise SystemExit(f"Missing required repository secret: {k}")
              lines.append(f"{k}={v}")
          for k in optional:
              v = (os.environ.get(k) or "").strip()
              if v:
                  lines.append(f"{k}={v}")
          Path(".env").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Send email
        run: python send_daily_quran.py

      - name: Commit reading progress
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/progress.json
          if git diff --staged --quiet; then
            echo "No progress file change to commit."
          else
            git commit -m "chore: advance Quran reading progress"
            git push
          fi
